name: Build RustDesk Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  ID_SERVER: "abc.zhm666.top"
  RELAY_SERVER: "abc.zhm666.top"
  PUBLIC_KEY: ""

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout RustDesk source
        run: |
          git clone --recurse-submodules https://github.com/rustdesk/rustdesk.git rustdesk-src

      - name: Setup MSVC build env
        uses: microsoft/setup-msbuild@v2

      - name: Install LLVM and Clang
        run: |
          choco install llvm --version=15.0.6 -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.24.5 $env:RUNNER_TEMP\flutter
          echo "$env:RUNNER_TEMP\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Replace Flutter engine with RustDesk custom engine
        run: |
          git clone https://github.com/rustdesk/flutter-desktop-embedding.git $env:RUNNER_TEMP\flutter-desktop-embedding
          Copy-Item -Recurse -Force $env:RUNNER_TEMP\flutter-desktop-embedding\flutter_rustdesk\* $env:RUNNER_TEMP\flutter\packages\flutter_tools\lib\src\web

      - name: Patch Flutter SDK for RustDesk
        run: |
          $flutterBin = "$env:RUNNER_TEMP\flutter\bin"
          $dart = "$flutterBin\dart"
          & $dart --version

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install 1.75
          rustup default 1.75
          rustup target add x86_64-pc-windows-msvc
          cargo install cargo-expand --version 1.0.95

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git $env:RUNNER_TEMP\vcpkg
          cd $env:RUNNER_TEMP\vcpkg
          git checkout 120deac3062162151622ca4860575a33844ba10b
          .\bootstrap-vcpkg.bat
          echo "$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:VCPKG_ROOT = "$env:RUNNER_TEMP\vcpkg"
          echo "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install vcpkg dependencies
        working-directory: rustdesk-src
        run: |
          vcpkg install --triplet x64-windows-static

      - name: Generate flutter-rust-bridge files
        working-directory: rustdesk-src
        run: |
          flutter pub get
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          flutter_rust_bridge_codegen generate

      - name: Patch RustDesk custom config
        working-directory: rustdesk-src
        run: |
          $file = "libs\hbb_common\src\config.rs"
          $content = Get-Content $file -Raw
          $content = $content -replace 'pub static ref PROD_RENDEZVOUS_SERVER: RwLock<String> = RwLock::new\(""\.to_owned\(\)\);', 'pub static ref PROD_RENDEZVOUS_SERVER: RwLock<String> = RwLock::new("abc.zhm666.top".to_owned());'
          $content = $content -replace 'pub static ref DEFAULT_SETTINGS: RwLock<HashMap<String, String>> = Default::default\(\);', 'pub static ref DEFAULT_SETTINGS: RwLock<HashMap<String, String>> = RwLock::new(HashMap::from([("relay-server".to_owned(), "abc.zhm666.top".to_owned())]));'
          $content = $content -replace 'pub const RS_PUB_KEY: &str = ".*?";', 'pub const RS_PUB_KEY: &str = "";'
          Set-Content -Path $file -Value $content -Encoding UTF8

      - name: Build installer EXE
        working-directory: rustdesk-src
        run: |
          python build.py --portable --hwcodec --flutter --vram

      - name: Rename installer EXE
        working-directory: rustdesk-src
        run: |
          Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $newName = "custom-rustdesk-$($_.Name)"
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-rustdesk-windows
          path: rustdesk-src/*.exe
