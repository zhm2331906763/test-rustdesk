name: Build RustDesk Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  ID_SERVER: "abc.zhm666.top"
  RELAY_SERVER: "abc.zhm666.top"
  PUBLIC_KEY: ""
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  FRB_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Checkout RustDesk source
        run: git clone --recurse-submodules https://github.com/rustdesk/rustdesk.git rustdesk-src

      - uses: microsoft/setup-msbuild@v2

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows

      - name: Install Flutter
        id: flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          $flutterCache = "${{ steps.flutter.outputs['CACHE-PATH'] }}"
          mv -Force windows-x64-release/* "$flutterCache/bin/cache/artifacts/engine/windows-x64-release/"

      - name: Patch flutter
        shell: bash
        run: |
          cp rustdesk-src/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff
        continue-on-error: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        working-directory: rustdesk-src
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"

      - name: Generate flutter-rust-bridge
        working-directory: rustdesk-src
        shell: bash
        run: |
          cargo install cargo-expand --version $CARGO_EXPAND_VERSION --locked
          cargo install flutter_rust_bridge_codegen --version $FRB_VERSION --features "uuid" --locked
          pushd flutter && flutter pub get && popd
          flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart

      - name: Patch RustDesk custom config
        working-directory: rustdesk-src
        run: |
          $file = "libs\hbb_common\src\config.rs"
          $content = Get-Content $file -Raw
          $content = $content -replace 'pub static ref PROD_RENDEZVOUS_SERVER: RwLock<String> = RwLock::new\(""\.to_owned\(\)\);', 'pub static ref PROD_RENDEZVOUS_SERVER: RwLock<String> = RwLock::new("abc.zhm666.top".to_owned());'
          $content = $content -replace 'pub static ref DEFAULT_SETTINGS: RwLock<HashMap<String, String>> = Default::default\(\);', 'pub static ref DEFAULT_SETTINGS: RwLock<HashMap<String, String>> = RwLock::new(HashMap::from([("relay-server".to_owned(), "abc.zhm666.top".to_owned())]));'
          $content = $content -replace 'pub const RS_PUB_KEY: &str = ".*?";', 'pub const RS_PUB_KEY: &str = "";'
          Set-Content -Path $file -Value $content -Encoding UTF8

      - name: Build rustdesk
        working-directory: rustdesk-src
        run: |
          python build.py --portable --hwcodec --flutter --vram

      - name: Rename installer
        working-directory: rustdesk-src
        run: |
          Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $newName = "custom-rustdesk-$($_.Name)"
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-rustdesk-windows
          path: rustdesk-src/*.exe
